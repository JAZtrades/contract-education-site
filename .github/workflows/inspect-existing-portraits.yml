name: Inspect existing portrait assets

on:
  push:
    branches:
      - codex/fix-professional-portrait-implementation
    paths:
      - '.github/workflows/inspect-existing-portraits.yml'

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Inspect binary portrait candidates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import struct
          import subprocess

          candidates = [
              ('39534a8e1cdac786d1f387711e1e89029fe318ee', 'assets/john-ai-portrait.jpg'),
              ('39534a8e1cdac786d1f387711e1e89029fe318ee', 'assets/john-photo.jpg'),
              ('39534a8e1cdac786d1f387711e1e89029fe318ee', 'assets/john-photo-hq.webp'),
              ('39534a8e1cdac786d1f387711e1e89029fe318ee', 'assets/john-zarcaro-professional-portrait.jpg'),
              ('d59d6b07a8a856542f1f2a97911e2cd1fbeb1bd3', 'assets/john-photo-hq.webp'),
              ('99aa846dc37493ec78d94aa58d7b09a0b5d3cef8', 'assets/john-photo-hq.webp'),
          ]

          def jpeg_size(data):
              if not data.startswith(b'\xff\xd8'):
                  return None
              i = 2
              sof = {0xC0,0xC1,0xC2,0xC3,0xC5,0xC6,0xC7,0xC9,0xCA,0xCB,0xCD,0xCE,0xCF}
              while i + 9 < len(data):
                  if data[i] != 0xFF:
                      i += 1
                      continue
                  while i < len(data) and data[i] == 0xFF:
                      i += 1
                  marker = data[i]
                  i += 1
                  if marker in (0xD8, 0xD9):
                      continue
                  length = struct.unpack('>H', data[i:i+2])[0]
                  if marker in sof:
                      height, width = struct.unpack('>HH', data[i+3:i+7])
                      return width, height
                  i += length
              return None

          def webp_size(data):
              if len(data) < 30 or data[:4] != b'RIFF' or data[8:12] != b'WEBP':
                  return None
              chunk = data[12:16]
              payload = data[20:]
              if chunk == b'VP8X' and len(payload) >= 10:
                  width = 1 + int.from_bytes(payload[4:7], 'little')
                  height = 1 + int.from_bytes(payload[7:10], 'little')
                  return width, height
              if chunk == b'VP8 ' and len(payload) >= 10 and payload[3:6] == b'\x9d\x01\x2a':
                  width = int.from_bytes(payload[6:8], 'little') & 0x3fff
                  height = int.from_bytes(payload[8:10], 'little') & 0x3fff
                  return width, height
              if chunk == b'VP8L' and len(payload) >= 5 and payload[0] == 0x2f:
                  bits = int.from_bytes(payload[1:5], 'little')
                  width = 1 + (bits & 0x3fff)
                  height = 1 + ((bits >> 14) & 0x3fff)
                  return width, height
              return None

          lines = []
          for commit, path in candidates:
              proc = subprocess.run(['git','show',f'{commit}:{path}'], capture_output=True)
              lines.append(f'commit={commit}')
              lines.append(f'path={path}')
              if proc.returncode:
                  lines.append('status=missing')
                  lines.append('---')
                  continue
              data = proc.stdout
              fmt = 'JPEG' if data[:2] == b'\xff\xd8' else ('WEBP' if data[:4] == b'RIFF' else 'TEXT_OR_UNKNOWN')
              dims = jpeg_size(data) or webp_size(data)
              git_blob = subprocess.check_output(['git','hash-object','--stdin'], input=data).decode().strip()
              lines.extend([
                  'status=present',
                  f'format={fmt}',
                  f'bytes={len(data)}',
                  f'dimensions={dims}',
                  f'sha256={hashlib.sha256(data).hexdigest()}',
                  f'git_blob={git_blob}',
                  f'head_hex={data[:16].hex()}',
                  '---',
              ])
          Path('portrait-existing-assets.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/inspect-existing-portraits.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record existing portrait asset metadata'
          git push origin HEAD:${{ github.ref_name }}
