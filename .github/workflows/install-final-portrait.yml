name: Install verified final professional portrait

on:
  push:
    branches:
      - codex/fix-professional-portrait-implementation
    paths:
      - '.github/workflows/install-final-portrait.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Rebuild, verify, install, and commit the portrait
        shell: bash
        run: |
          set +e
          exec > >(tee install-final-log.txt) 2>&1

          status=0
          base_commit='39534a8e1cdac786d1f387711e1e89029fe318ee'
          encoded_file="$(mktemp)"
          portrait_file="$(mktemp)"

          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: $(git rev-parse HEAD)"
          echo "Source commit: ${base_commit}"

          if ! git cat-file -e "${base_commit}^{commit}" 2>/dev/null; then
            echo 'Base commit is not local; fetching it directly.'
            git fetch --no-tags origin "${base_commit}" || status=1
          fi

          if [ "$status" -eq 0 ]; then
            : > "$encoded_file"
            for part in 01 02 03 04 05 06 07; do
              source_path="assets/portrait-v11-part-${part}.b64"
              echo "Reading ${source_path} from ${base_commit}"
              git show "${base_commit}:${source_path}" >> "$encoded_file" || status=1
            done
          fi

          if [ "$status" -eq 0 ]; then
            tr -d '\r\n' < "$encoded_file" | base64 --decode > "$portrait_file" || status=1
          fi

          if [ "$status" -eq 0 ]; then
            actual_bytes="$(stat -c%s "$portrait_file")"
            actual_sha="$(sha256sum "$portrait_file" | cut -d' ' -f1)"
            echo "Decoded bytes: ${actual_bytes}"
            echo "Decoded SHA-256: ${actual_sha}"
            [ "$actual_bytes" = '91422' ] || status=1
            [ "$actual_sha" = 'e6687b44de3f20bb30fe2e6a6dde978c955609b0cecaec0d7f6a8b0b224f8d30' ] || status=1
          fi

          if [ "$status" -eq 0 ]; then
            PORTRAIT_TMP="$portrait_file" python3 - <<'PY' || status=1
          from pathlib import Path
          import hashlib
          import os
          import struct

          path = Path(os.environ['PORTRAIT_TMP'])
          data = path.read_bytes()
          assert data[:2] == b'\xff\xd8', 'Missing JPEG start marker'
          assert data[-2:] == b'\xff\xd9', 'Missing JPEG end marker'

          width = height = None
          index = 2
          sof_markers = {
              0xC0, 0xC1, 0xC2, 0xC3, 0xC5, 0xC6, 0xC7,
              0xC9, 0xCA, 0xCB, 0xCD, 0xCE, 0xCF,
          }
          while index < len(data):
              if data[index] != 0xFF:
                  index += 1
                  continue
              while index < len(data) and data[index] == 0xFF:
                  index += 1
              marker = data[index]
              index += 1
              if marker in (0xD8, 0xD9):
                  continue
              segment_length = struct.unpack('>H', data[index:index + 2])[0]
              if marker in sof_markers:
                  height, width = struct.unpack('>HH', data[index + 3:index + 7])
                  break
              index += segment_length

          digest = hashlib.sha256(data).hexdigest()
          assert len(data) == 91422, len(data)
          assert digest == 'e6687b44de3f20bb30fe2e6a6dde978c955609b0cecaec0d7f6a8b0b224f8d30', digest
          assert (width, height) == (600, 750), (width, height)
          print('PORTRAIT VERIFIED')
          print('dimensions=600x750')
          print('bytes=91422')
          print(f'sha256={digest}')
          PY
          fi

          if [ "$status" -eq 0 ]; then
            cp "$portrait_file" assets/john-zarcaro-professional-portrait.jpg

            python3 - <<'PY' || status=1
          from pathlib import Path
          import re

          page = Path('index.html')
          html = page.read_text(encoding='utf-8')
          pattern = re.compile(r'<img\s+(?:id="john-portrait"\s+)?class="hero-avatar-img"[^>]*>', re.I)
          replacement = (
              '<img class="hero-avatar-img" '
              'src="assets/john-zarcaro-professional-portrait.jpg?v=final-600" '
              'width="600" height="750" loading="eager" decoding="async" '
              'fetchpriority="high" alt="Professional portrait of John Zarcaro">'
          )
          html, count = pattern.subn(replacement, html, count=1)
          if count != 1:
              raise SystemExit(f'Expected one portrait element, replaced {count}')
          if 'portrait-loader.js' in html or 'data:image' in html or 'john-hero-avatar' in html:
              raise SystemExit('Obsolete portrait loading code remains in the homepage')
          page.write_text(html, encoding='utf-8')

          styles = Path('styles.css')
          css = styles.read_text(encoding='utf-8')
          css = css.replace('width: min(100%, 360px);', 'width: min(100%, 300px);')
          css = css.replace('aspect-ratio: 1122 / 1402;', 'aspect-ratio: 4 / 5;')
          css = css.replace('.photo-ring { width: min(100%, 340px); }', '.photo-ring { width: min(100%, 300px); }')
          styles.write_text(css, encoding='utf-8')

          polish = Path('carlsbad-polish.css')
          css = polish.read_text(encoding='utf-8')
          css = css.replace('width: min(100%, 280px);', 'width: min(100%, 230px);')
          css = css.replace('aspect-ratio: 1122 / 1402;', 'aspect-ratio: 4 / 5;')
          polish.write_text(css, encoding='utf-8')
          PY
          fi

          if [ "$status" -eq 0 ]; then
            installed_bytes="$(stat -c%s assets/john-zarcaro-professional-portrait.jpg)"
            installed_sha="$(sha256sum assets/john-zarcaro-professional-portrait.jpg | cut -d' ' -f1)"
            [ "$installed_bytes" = '91422' ] || status=1
            [ "$installed_sha" = 'e6687b44de3f20bb30fe2e6a6dde978c955609b0cecaec0d7f6a8b0b224f8d30' ] || status=1
          fi

          if [ "$status" -eq 0 ]; then
            cat > portrait-final-verification.txt <<'EOF'
          PORTRAIT VERIFIED
          dimensions=600x750
          bytes=91422
          sha256=e6687b44de3f20bb30fe2e6a6dde978c955609b0cecaec0d7f6a8b0b224f8d30
          source=verified repository-history chunks
          implementation=static JPEG; no loader, SVG, Blob URL, data URL, filter, or transform
          desktop_display_width=300px
          mobile_display_width=230px
          EOF
            rm -f portrait-metadata.txt
            rm -f .github/workflows/verify-portrait.yml
            rm -f .github/workflows/install-final-portrait.yml
            rm -f install-final-log.txt
          else
            echo "INSTALLATION FAILED WITH STATUS ${status}"
          fi

          rm -f "$encoded_file" "$portrait_file"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "$([ "$status" -eq 0 ] && echo 'Install verified sharp professional portrait' || echo 'Record final portrait installation failure')"
          git push origin HEAD:${{ github.ref_name }}

          exit "$status"
