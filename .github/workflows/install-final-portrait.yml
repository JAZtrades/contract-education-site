name: Install verified final professional portrait

on:
  push:
    paths:
      - '.github/workflows/install-final-portrait.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Restore and verify the high-quality portrait
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force

          tmp_file="$(mktemp)"
          for part in 01 02 03 04 05 06 07; do
            git show "origin/main:assets/portrait-v11-part-${part}.b64"
          done | tr -d '\r\n' | base64 --decode > "$tmp_file"

          echo 'e6687b44de3f20bb30fe2e6a6dde978c955609b0cecaec0d7f6a8b0b224f8d30  '"$tmp_file" | sha256sum -c -
          test "$(stat -c%s "$tmp_file")" = '91422'

          PORTRAIT_TMP="$tmp_file" python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import os
          import struct

          path = Path(os.environ['PORTRAIT_TMP'])
          data = path.read_bytes()
          assert data[:2] == b'\xff\xd8', 'Missing JPEG start marker'
          assert data[-2:] == b'\xff\xd9', 'Missing JPEG end marker'

          width = height = None
          index = 2
          sof_markers = {
              0xC0, 0xC1, 0xC2, 0xC3, 0xC5, 0xC6, 0xC7,
              0xC9, 0xCA, 0xCB, 0xCD, 0xCE, 0xCF,
          }
          while index < len(data):
              if data[index] != 0xFF:
                  index += 1
                  continue
              while index < len(data) and data[index] == 0xFF:
                  index += 1
              marker = data[index]
              index += 1
              if marker in (0xD8, 0xD9):
                  continue
              segment_length = struct.unpack('>H', data[index:index + 2])[0]
              if marker in sof_markers:
                  height, width = struct.unpack('>HH', data[index + 3:index + 7])
                  break
              index += segment_length

          digest = hashlib.sha256(data).hexdigest()
          assert len(data) == 91422, len(data)
          assert digest == 'e6687b44de3f20bb30fe2e6a6dde978c955609b0cecaec0d7f6a8b0b224f8d30', digest
          assert (width, height) == (600, 750), (width, height)

          report = (
              'PORTRAIT VERIFIED\n'
              'dimensions=600x750\n'
              'bytes=91422\n'
              f'sha256={digest}\n'
              'source=verified repository-history chunks\n'
          )
          Path('portrait-final-verification.txt').write_text(report, encoding='utf-8')
          print(report)
          PY

          cp "$tmp_file" assets/john-zarcaro-professional-portrait.jpg
          rm -f "$tmp_file"

      - name: Use the verified portrait without filters or loaders
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          page = Path('index.html')
          html = page.read_text(encoding='utf-8')
          pattern = re.compile(r'<img\s+(?:id="john-portrait"\s+)?class="hero-avatar-img"[^>]*>', re.I)
          replacement = (
              '<img class="hero-avatar-img" '
              'src="assets/john-zarcaro-professional-portrait.jpg?v=final-600" '
              'width="600" height="750" loading="eager" decoding="async" '
              'fetchpriority="high" alt="Professional portrait of John Zarcaro">'
          )
          html, count = pattern.subn(replacement, html, count=1)
          if count != 1:
              raise SystemExit(f'Expected one portrait element, replaced {count}')
          if 'portrait-loader.js' in html or 'data:image' in html or 'onerror=' in replacement:
              raise SystemExit('Obsolete portrait loading code remains')
          page.write_text(html, encoding='utf-8')

          styles = Path('styles.css')
          css = styles.read_text(encoding='utf-8')
          css = css.replace('width: min(100%, 360px);', 'width: min(100%, 300px);')
          css = css.replace('aspect-ratio: 1122 / 1402;', 'aspect-ratio: 4 / 5;')
          css = css.replace('.photo-ring { width: min(100%, 340px); }', '.photo-ring { width: min(100%, 300px); }')
          styles.write_text(css, encoding='utf-8')

          polish = Path('carlsbad-polish.css')
          css = polish.read_text(encoding='utf-8')
          css = css.replace('width: min(100%, 280px);', 'width: min(100%, 230px);')
          css = css.replace('aspect-ratio: 1122 / 1402;', 'aspect-ratio: 4 / 5;')
          polish.write_text(css, encoding='utf-8')
          PY

          grep -q 'assets/john-zarcaro-professional-portrait.jpg?v=final-600' index.html
          ! grep -q 'portrait-loader.js' index.html
          ! grep -q 'data:image' index.html
          ! grep -q 'john-hero-avatar' index.html
          ! grep -q 'john-photo-hq' index.html
          ! grep -q 'filter: contrast' styles.css carlsbad-polish.css

      - name: Verify the installed repository asset
        shell: bash
        run: |
          set -euo pipefail
          echo 'e6687b44de3f20bb30fe2e6a6dde978c955609b0cecaec0d7f6a8b0b224f8d30  assets/john-zarcaro-professional-portrait.jpg' | sha256sum -c -
          test "$(stat -c%s assets/john-zarcaro-professional-portrait.jpg)" = '91422'

      - name: Remove diagnostic and one-time workflow files
        shell: bash
        run: |
          rm -f portrait-metadata.txt
          rm -f .github/workflows/verify-portrait.yml
          rm -f .github/workflows/install-final-portrait.yml

      - name: Commit the final verified portrait
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Install verified sharp professional portrait'
          git push origin HEAD:${{ github.ref_name }}
