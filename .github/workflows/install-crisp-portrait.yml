name: Install verified portrait

on:
  push:
    paths:
      - '.github/workflows/install-crisp-portrait.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and verify the high-quality portrait
        shell: bash
        run: |
          cat assets/portrait-v11-part-*.b64 | tr -d '\r\n' | base64 --decode > assets/john-portrait-crisp-v12.jpg
          echo "e6687b44de3f20bb30fe2e6a6dde978c955609b0cecaec0d7f6a8b0b224f8d30  assets/john-portrait-crisp-v12.jpg" | sha256sum -c -
          test "$(stat -c%s assets/john-portrait-crisp-v12.jpg)" = "91422"

      - name: Install the portrait and refine its presentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('index.html')
          html = page.read_text(encoding='utf-8')
          start = html.index('<img class="hero-avatar-img"', html.index('<div class="photo-ring">'))
          end = html.index('>', start) + 1
          replacement = '<img class="hero-avatar-img" src="assets/john-portrait-crisp-v12.jpg?v=12" width="600" height="750" loading="eager" decoding="async" fetchpriority="high" alt="Professional portrait of John Zarcaro">'
          html = html[:start] + replacement + html[end:]
          html = html.replace('carlsbad-polish.css?v=2', 'carlsbad-polish.css?v=3')
          page.write_text(html, encoding='utf-8')

          stylesheet = Path('carlsbad-polish.css')
          css = stylesheet.read_text(encoding='utf-8')
          marker = '/* Portrait quality and sizing — verified mobile-safe presentation. */'
          override = r'''

/* Portrait quality and sizing — verified mobile-safe presentation. */
.photo-ring {
  width: min(100%, 340px);
  min-height: 0;
  aspect-ratio: 4 / 5;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 28px;
}

.photo-ring .hero-avatar-img {
  display: block;
  width: 100% !important;
  height: 100% !important;
  max-width: 100% !important;
  object-fit: cover;
  object-position: center center;
  transform: none !important;
  filter: none !important;
  image-rendering: auto;
}

@media (max-width: 640px) {
  .photo-card-shell {
    width: min(100%, 360px);
    margin-inline: auto;
  }

  .photo-ring {
    width: min(100%, 260px) !important;
    min-height: 0 !important;
    aspect-ratio: 4 / 5;
    margin: 2px auto 0;
    border-radius: 24px;
  }

  .photo-ring::before {
    inset: 8px;
  }

  .photo-ring .hero-avatar-img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
    object-position: center center;
    filter: none !important;
  }
}
'''
          if marker in css:
              css = css[:css.index(marker)].rstrip() + override
          else:
              css = css.rstrip() + override
          stylesheet.write_text(css, encoding='utf-8')
          PY

      - name: Remove temporary and obsolete portrait files
        shell: bash
        run: |
          rm -f assets/portrait-*.b64
          rm -f assets/john-photo-hq.webp
          rm -f assets/john-ai-portrait.svg
          rm -f assets/john-ai-portrait-v2.svg
          rm -f __test_tree_probe.txt
          rm -f .github/workflows/install-crisp-portrait.yml

      - name: Commit the verified result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install sharp professional portrait"
          git push origin HEAD:main
