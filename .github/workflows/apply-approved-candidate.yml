name: Apply approved public candidate

on:
  push:
    branches:
      - codex/verified-payment-process-copy
    paths:
      - ".github/workflows/apply-approved-candidate.yml"

permissions:
  contents: write

concurrency:
  group: apply-approved-public-candidate
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/verified-payment-process-copy
          fetch-depth: 1
      - name: Replace branch with the approved candidate tree
        shell: bash
        run: |
          set -euo pipefail
          test -f jaz-public-candidate-741df8e.tar.gz
          staging="$(mktemp -d)"
          tar -xzf jaz-public-candidate-741df8e.tar.gz -C "$staging"
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='jaz-public-candidate-741df8e.tar.gz' \
            --exclude='.github/workflows/apply-approved-candidate.yml' \
            "$staging/" ./
          rm -f jaz-public-candidate-741df8e.tar.gz
          rm -f .github/workflows/apply-approved-candidate.yml
          git config user.name "JAZtrades"
          git config user.email "cryptobossman54130@gmail.com"
          git add -A
          git diff --cached --check
          test "$(git write-tree)" = "73abeaf435313d114d6a5dfc026a168ead66b459"
          git commit -m "Polish public education site for preview"
          git push origin "HEAD:${GITHUB_REF_NAME}"
