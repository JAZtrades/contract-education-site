<svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">John Zarcaro face portrait</title>
<desc id="desc">Circular real face portrait of John Zarcaro, centered inside the circle.</desc>
<defs>
<clipPath id="faceCircle"><circle cx="140" cy="140" r="122"/></clipPath>
<filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#A855F7" flood-opacity="0.55"/><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.42"/></filter>
</defs>
<circle cx="140" cy="140" r="137" fill="#08040F"/>
<circle cx="140" cy="140" r="132" fill="none" stroke="#F6C85F" stroke-width="7"/>
<circle cx="140" cy="140" r="124" fill="#10071F"/>
<g clip-path="url(#faceCircle)" filter="url(#softGlow)">
<image x="18" y="18" width="244" height="244" preserveAspectRatio="xMidYMid slice" href="data:image/jpeg;base64,"/>
</g>
<circle cx="140" cy="140" r="122" fill="none" stroke="#C084FC" stroke-width="3" stroke-opacity="0.72"/>
</svg>